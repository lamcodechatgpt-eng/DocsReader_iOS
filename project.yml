name: DocsReader
options:
  bundleIdPrefix: com.nexus
  deploymentTarget:
    iOS: "16.0"
targets:
  DocsReader:
    type: application
    platform: iOS
    sources:
      - path: ContentView.swift
      - path: DocsReaderApp.swift
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        GIDClientID: "MOCK_CLIENT_ID_REPLACE_ME.apps.googleusercontent.com"
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - "com.googleusercontent.apps.MOCK_CLIENT_ID_REPLACE_ME"
        UIBackgroundModes:
          - audio
    settings:
      CODE_SIGNING_ALLOWED: "NO"
      CODE_SIGNING_REQUIRED: "NO"
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS.git
    from: 7.0.0
